<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>광고 플랫폼 통합 공지사항 인사이트 센터</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
</head>
<body>
    <header>
        <div class="header-left">
            <div class="header-logo-icon">
                <span class="material-icons-round">campaign</span>
            </div>
            <h1>광고 플랫폼 통합 공지사항 인사이트 센터</h1>
        </div>
        <div class="header-right" id="data-status">
            <!-- Sync status here -->
        </div>
    </header>

    <main class="dashboard-main">
        <!-- Left: Notice List -->
        <section class="side-list-pane">
            <div class="pane-header">
                <div class="platform-filter-scroll" id="platform-tabs">
                    <button class="filter-chip active" data-platform="all">전체 매체</button>
                    <button class="filter-chip" data-platform="naver">네이버</button>
                    <button class="filter-chip" data-platform="kakao">카카오</button>
                    <button class="filter-chip" data-platform="google">구글</button>
                    <button class="filter-chip" data-platform="meta">메타</button>
                    <button class="filter-chip" data-platform="daangn">당근</button>
                    <button class="filter-chip" data-platform="others">기타</button>
                </div>
            </div>
            
            <div class="scroll-list" id="notice-list-container">
                <!-- List items inject here -->
            </div>
        </section>

        <!-- Right: Detail View -->
        <section class="content-detail-pane" id="detail-pane">
            <div class="detail-empty">
                <span class="material-icons-round" style="font-size: 64px;">auto_awesome_motion</span>
                <p style="margin-top: 16px; font-weight: 500;">확인할 공지사항을 목록에서 선택해주세요</p>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
