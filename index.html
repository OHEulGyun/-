<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>광고 매체 통합 공지사항 | Premium Insight Center</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
</head>
<body>
    <div class="app-frame">
        <!-- 1. Side Rail -->
        <nav class="nav-rail">
            <div class="nav-item active"><span class="material-icons-round">dashboard</span></div>
            <div class="nav-item"><span class="material-icons-round">analytics</span></div>
            <div class="nav-item"><span class="material-icons-round">settings</span></div>
            <div style="margin-top: auto;" class="nav-item"><span class="material-icons-round">logout</span></div>
        </nav>

        <!-- 2. List Pane -->
        <section class="list-pane">
            <div class="list-header">
                <h1>Insight 센터</h1>
                <div class="platform-filter" id="platform-tabs">
                    <div class="chip active" data-platform="all">전체</div>
                    <div class="chip" data-platform="naver">Naver</div>
                    <div class="chip" data-platform="kakao">Kakao</div>
                    <div class="chip" data-platform="google">Google</div>
                    <div class="chip" data-platform="meta">Meta</div>
                    <div class="chip" data-platform="daangn">당근</div>
                    <div class="chip" data-platform="others">기타</div>
                </div>
            </div>
            <div class="notice-list" id="notice-list">
                <!-- Data injection here -->
            </div>
        </section>

        <!-- 3. Dynamic Detail Pane -->
        <main class="detail-pane" id="main-detail">
            <div class="empty-hero">
                <span class="material-icons-round" style="font-size: 120px;">newspaper</span>
                <p style="font-size: 20px; font-weight: 700; margin-top: 24px;">분석할 공지사항을 선택해 주세요</p>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
