name: Update Ads Notices

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '0 0 * * *' # Every day at 0:00 UTC (9:00 AM KST)
    - cron: '0 12 * * *' # Every day at 12:00 UTC (9:00 PM KST) for double check
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 playwright
        python -m playwright install --with-deps chromium

    - name: Run scraper
      run: python scripts/fetch_notices.py

    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add notices.json
        git commit -m "Auto-update notices: 9:00 AM KST Sync" || exit 0
        git push
