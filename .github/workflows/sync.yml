name: Sync Ads Notices and Emails

on:
  schedule:
    - cron: '0 * * * *' # Every hour
  workflow_dispatch: # Allow manual trigger

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install beautifulsoup4 playwright
        playwright install chromium

    - name: Fetch Notices
      run: python scripts/fetch_notices.py

    - name: Fetch Emails
      env:
        EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
      run: python scripts/fetch_emails.py

    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add notices.json emails.json
        git commit -m "Auto-update notices and emails [skip ci]" || echo "No changes to commit"
        git push origin main
